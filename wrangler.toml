# ============================================================
# UniSkill Gateway — Wrangler Configuration
# 部署目标: Cloudflare Workers
# ============================================================

name            = "uniskill-gateway"
main            = "src/index.ts"
compatibility_date = "2025-01-01"

# Workers 运行时支持的最新兼容性标志
compatibility_flags = ["nodejs_compat"]

# ── KV 命名空间绑定 ──────────────────────────────────────────
# 本地开发时使用 preview_id；生产部署时使用 id。
# 请将下方占位符替换为你在 Cloudflare Dashboard 中创建的 KV namespace ID。
[[kv_namespaces]]
binding = "UNISKILL_KV"    # 代码中通过 env.UNISKILL_KV 访问
id      = "9f388e510ffc426c8320f839ae769fe3"

# ── 密钥变量（所有真实 API Key 均通过 Cloudflare Secret 注入，绝不明文入库）───
# Tavily Search & News API Key
#   部署: npx wrangler secret put TAVILY_API_KEY
#   本地: 在 .dev.vars 文件中添加 TAVILY_API_KEY=tvly-xxxxxxxxxxxx
#
# Jina AI Reader API Key（供 /v1/scrape 技能使用）
#   部署: npx wrangler secret put JINA_API_KEY
#   本地: 在 .dev.vars 文件中添加 JINA_API_KEY=jina_xxxxxxxxxxxx
#
# Admin 共享密钥（供 Vercel 等受信任后端调用 /admin/provision）
#   部署: npx wrangler secret put ADMIN_KEY
#   本地: 在 .dev.vars 文件中添加 ADMIN_KEY=your-admin-secret
#
# Vercel Webhook URL（扣分后回写 Supabase 用）
#   部署: npx wrangler secret put VERCEL_WEBHOOK_URL
#   本地: 在 .dev.vars 文件中添加 VERCEL_WEBHOOK_URL=https://your-site.vercel.app/api/webhook/sync-credits

# ── npm 脚本建议 (在 package.json 中配置) ───────────────────
# dev:    npx wrangler dev
# deploy: npx wrangler deploy
